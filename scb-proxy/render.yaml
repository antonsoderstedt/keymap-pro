services:
  - type: web
    name: scb-mtls-proxy
    env: node
    rootDir: scb-proxy
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PROXY_TOKEN
        sync: false
      - key: SCB_URL
        value: https://privateapi.scb.se/nv0101/v1/sokpavar/api/je/hamtaforetag
      - key: SCB_CERT_PEM
        sync: false
      - key: SCB_KEY_PEM
        sync: false
      - key: SCB_AUTH_HEADER
        sync: false
